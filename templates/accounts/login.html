{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CRM Eleitoral Sorgatto 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #002776 0%, #003DA5 50%, #009c3b 100%);">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold" style="color: #002776;">CRM ELEITORAL</h1>
            <p class="font-semibold text-lg" style="color: #009c3b;">SORGATTO 26</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">
            Usuário ou senha incorretos.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" name="username" id="id_username" required autofocus
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none" style="--tw-ring-color: #003DA5;">
            </div>
            <div class="mb-6">
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:outline-none" style="--tw-ring-color: #003DA5;">
            </div>
            <button type="submit"
                    class="w-full text-white py-2.5 rounded-lg font-semibold transition hover:opacity-90" style="background: #002776;">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
